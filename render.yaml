services:
  - type: web
    name: unbilled-revenue-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB_NAME
        value: unbilled_detective
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_OWNER
        sync: false
      - key: GITHUB_REPO
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_CHANNEL_IDS
        sync: false
      - key: JIRA_BASE_URL
        sync: false
      - key: JIRA_EMAIL
        sync: false
      - key: JIRA_API_TOKEN
        sync: false
      - key: JIRA_PROJECT_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: API_KEY
        sync: false
      - key: AI_MAX_RETRIES
        value: "1"
      - key: AI_RETRY_DELAY_SECONDS
        value: "0"
      - key: SENDGRID_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false
